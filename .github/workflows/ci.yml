name: CI

# Vérifie la logique du générateur de données à chaque push et pull request.
# Distinct de update-data.yml, qui régénère docs/data.json une fois par jour :
# ici on ne touche pas aux données, on valide seulement le code.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
