name: Update Pledge Fair data

on:
  schedule:
    # Une fois par jour : RSI et UEX ne changent pas assez vite pour justifier
    # plus. GitHub peut retarder les cron de quelques minutes en cas de forte
    # charge sur l'infrastructure Actions.
    - cron: "0 6 * * *"
  workflow_dispatch: {} # bouton "Run workflow" pour rafraîchir manuellement

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run data update script
        run: node scripts/update-data.mjs

      - name: Commit and push docs/data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "Aucun changement de données — rien à commiter."
          else
            git commit -m "chore: mise à jour automatique des données ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
