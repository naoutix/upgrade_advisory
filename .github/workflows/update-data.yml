name: Update Pledge Fair data

on:
  schedule:
    # Une fois par jour : RSI et UEX ne changent pas assez vite pour justifier
    # plus. GitHub peut retarder les cron de quelques minutes en cas de forte
    # charge sur l'infrastructure Actions.
    - cron: "0 6 * * *"
  workflow_dispatch: {} # bouton "Run workflow" pour rafraîchir manuellement

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run data update script
        id: generate
        run: node scripts/update-data.mjs

      # Le script réussit même quand une source est en repli (par conception :
      # mieux vaut des données partielles que rien). On lève ici un signal
      # visible — l'exécution est marquée en échec si une source a échoué —
      # pour ne pas laisser des données dégradées se figer en silence.
      - name: Check for degraded sources
        run: |
          node -e '
            const { meta } = require("./docs/data.json");
            const flags = ["storefrontOk", "rsiOk", "shipMatrixOk", "conciergeWikiOk"];
            const down = flags.filter((f) => meta[f] === false);
            if (down.length) {
              console.error("::warning::Sources en repli au dernier rafraîchissement : " + down.join(", "));
              process.exit(1);
            }
            console.log("Toutes les sources ont répondu.");
          '

      - name: Commit and push docs/data.json if changed
        # On committe dès que la génération a réussi, même si l'étape de
        # contrôle a marqué l'exécution en échec pour signaler une source en
        # repli : des données partielles valent mieux que les précédentes.
        # En revanche, si les tests ou la génération ont échoué, on ne committe
        # rien (l'étape 'generate' n'aurait pas le statut 'success').
        if: always() && steps.generate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "Aucun changement de données — rien à commiter."
          else
            git commit -m "chore: mise à jour automatique des données ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
